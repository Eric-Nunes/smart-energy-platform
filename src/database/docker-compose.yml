version: "3.9"

services:
  smartenergy-sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: smartenergy-sqlserver
    restart: always
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "SmartEnergy@123"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

volumes:
  sqlserver_data: